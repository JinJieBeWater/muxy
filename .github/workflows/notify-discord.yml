name: Notify Discord

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to announce (e.g. v0.26.0 or v0.26.0-beta.42)"
        required: true
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -z "$DISCORD_WEBHOOK_URL" ]]; then
            echo "Error: DISCORD_WEBHOOK_URL not set"
            exit 1
          fi
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Error: release $TAG not found"
            exit 1
          fi
          if [[ "$TAG" == *-beta.* ]]; then
            VERSION="${TAG#v}"
            TITLE="Muxy ${VERSION} (beta) released"
            FOOTER="Beta channel"
            COLOR=15844367
          else
            TITLE="Muxy ${TAG} released"
            FOOTER="Stable channel"
            COLOR=3066993
          fi
          NOTES=$(gh release view "$TAG" --repo "$REPO" --json body --jq .body \
            | sed -E 's# by @[A-Za-z0-9_-]+ in https://github\.com/[^ ]+/pull/[0-9]+##g')
          if [[ ${#NOTES} -gt 3800 ]]; then
            NOTES="${NOTES:0:3800}…"
          fi
          URL="https://github.com/${REPO}/releases/tag/${TAG}"
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg url "$URL" \
            --arg notes "$NOTES" \
            --arg footer "$FOOTER" \
            --argjson color "$COLOR" \
            '{
              username: "Muxy Releases",
              embeds: [{
                title: $title,
                url: $url,
                description: $notes,
                color: $color,
                footer: { text: $footer },
                timestamp: (now | todate)
              }]
            }')
          curl -fsSL -H "Content-Type: application/json" \
            -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
